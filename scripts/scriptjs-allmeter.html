<script>
    let meters = [];
    let filteredMeters = [];
    let filteredDataInMeters = [];
    let types = [];
    let locations = [];
    let groups = [];
    const rowsPerPage = 12;
    let currentPage = 1;
    let refreshIntervalId;

    const typeMeterID = "<?=$_SESSION['tid'];?>";
    const groupID = "<?=$_SESSION['gid'];?>";

    document.addEventListener("DOMContentLoaded", async () => {
        showLoading();
        await process();
        await setRefreshTime();
        hideLoading();
    });

    async function fetchAll() {
        let res_location = await fetch("../config/fetch-locations.php");
        let json_location = await res_location.json();
        locations = json_location.data;

        let res_group = await fetch("../config/fetch-groups.php");
        let json_group = await res_group.json();
        groups = json_group.data;

        meters = await fetchDataInMeters();

        let responsetype = await fetch("../config/fetch-data_type.php");
        let jsontype = await responsetype.json();
        types = jsontype.data;
    }

    async function fetchDataInMeters() {
        let formfilter = new FormData();
        formfilter.append("tid", typeMeterID);
        formfilter.append("gid", groupID);

        try {
            const res = await fetch("../config/fetch-meters-filter.php", {
                method: "POST",
                body: formfilter
            });
            const result = await res.json();
            return result.data;
        } catch (e) {
            console.error('error unknown file fetch-meters-filter.php : ', e.message);
            alertMessages('error', 'พบปัญหา', 'เกิดข้อผิดพลาดในการทำงานของสคริปต์ fetch-meters-filter กรุณาคัดลอกข้อความนี้และส่งต่อให้ผู้ดูแลระบบ', 4000, true);
            return [];
        }
    }

    async function process() {
        await fetchAll();
        await createTable();
        await filterDataInMeters();
    }

    async function filterDataInMeters() {
        const time = document.getElementById('select-filter-value');
        let now = new Date();
        let selectedDateTime = new Date(now.getTime() - parseInt(10, 10) * 60000);
        filteredDataInMeters = Object.values(meters).map(fm => {
            let Datafiltered = {};
            Object.entries(fm.data).map(([key, rows]) => {
                Datafiltered[key] = Object.values(rows).filter(datatype => {
                    let date = new Date(datatype.create_date);
                    return date >= selectedDateTime;
                });
            });
            return {
                ...fm,
                data: Datafiltered,
            }
        });

        await updateData(currentPage);
    }

    function createTable() {
        const table = document.getElementById("table-meter");
        table.querySelector('thead').innerHTML = "";

        const headerRow = document.createElement("tr");
        headerRow.innerHTML = `
        <th class="text-nowrap" style="min-width:180px;"><?=$lang['nmeters']?></th>
        <th class="text-nowrap"><?=$lang['location']?></th>
        <th class="text-nowrap"><?=$lang['group']?>/<?=$lang['project']?></th>
        <th class="text-nowrap text-center"><?=$lang['ip']?></th>
        <th class="text-nowrap text-center"><?=$lang['port']?></th>
        <th class="text-nowrap text-center"><?=$lang['protocol']?></th>
    `;

        types.forEach(col => {
            const th = document.createElement("th");
            th.style.backgroundColor = '#001B5E';
            th.style.whiteSpace = "nowrap";
            th.className = "text-center";
            th.style.color = 'white';
            th.textContent = col.name;
            headerRow.appendChild(th);
        });

        table.querySelector('thead').appendChild(headerRow);
        applyDarkModeColors();
    }

    async function updateData(page) {
        currentPage = page;
        const table = document.getElementById("table-meter");
        table.querySelector('tbody').innerHTML = "";

        const start = (page - 1) * rowsPerPage;
        const end = start + rowsPerPage;
        const pageData = filteredDataInMeters.slice(start, end);

        pageData.forEach(meter => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
            <td>${meter.name}</td>
            <td class="text-center text-nowrap">${getNameLocation(meter.group_id)}</td>
            <td class="text-center text-nowrap">${getNameGroup(meter.group_id)}</td>
            <td class="text-center text-nowrap">${meter.ip_address}</td>
            <td class="text-center">${meter.port}</td>
            <td class="text-center">${meter.protocol}</td>
            `;

            Object.values(meter.data).forEach(column => {
                const td = document.createElement("td");
                td.className = "text-center";
                if (Array.isArray(column) && column.length > 0) {
                    const last = column[column.length - 1];
                    td.textContent = last.value;
                } else {
                    td.textContent = "-";
                }
                tr.appendChild(td);
            });
            table.querySelector('tbody').appendChild(tr);
        });

        renderPagination(filteredDataInMeters.length, page);

        // ✅ apply สีหลัง render เสร็จ
        applyDarkModeColors();
    }

    // ✅ ฟังก์ชัน set สีตัวอักษรใน table ด้วย inline style (ชนะ Bootstrap และ CSS ทุกอัน)
    function applyDarkModeColors() {
        const isDark = document.documentElement.classList.contains('dark');
        const color = isDark ? '#ffffff' : '#111827';
        document.querySelectorAll('#table-meter td, #table-meter th').forEach(el => {
            // ยกเว้น th ที่มี backgroundColor เป็น #001B5E (data type headers) ให้คงสีขาวไว้เสมอ
            if (el.style.backgroundColor === 'rgb(0, 27, 94)') {
                el.style.color = '#ffffff';
            } else {
                el.style.color = color;
            }
        });
    }

    function renderPagination(totalRows, activePage) {
        const paginationDiv = document.getElementById("pagination");
        const infoDiv = document.getElementById("pagination-info");
        paginationDiv.innerHTML = "";

        const totalPages = Math.ceil(totalRows / rowsPerPage);

        // ── สรุปข้อมูล: แสดง X ถึง Y จากทั้งหมด Z รายการ ──
        const start = (activePage - 1) * rowsPerPage + 1;
        const end = Math.min(activePage * rowsPerPage, totalRows);
        infoDiv.textContent = `แสดง ${start} ถึง ${end} จากทั้งหมด ${totalRows} รายการ`;

        // ── ปุ่ม Previous ──
        const prevBtn = document.createElement("button");
        prevBtn.innerHTML = `<span class="material-icons-outlined" style="font-size:1rem;line-height:1">chevron_left</span>`;
        prevBtn.disabled = activePage === 1;
        prevBtn.style.opacity = activePage === 1 ? '0.4' : '1';
        prevBtn.addEventListener("click", () => {
            if (activePage > 1) updateData(activePage - 1);
        });
        paginationDiv.appendChild(prevBtn);

        // ── ปุ่มหมายเลขหน้า ──
        for (let i = 1; i <= totalPages; i++) {
            const btn = document.createElement("button");
            btn.textContent = i;
            if (i === activePage) btn.classList.add("active");
            btn.addEventListener("click", () => { updateData(i); });
            paginationDiv.appendChild(btn);
        }

        // ── ปุ่ม Next ──
        const nextBtn = document.createElement("button");
        nextBtn.innerHTML = `<span class="material-icons-outlined" style="font-size:1rem;line-height:1">chevron_right</span>`;
        nextBtn.disabled = activePage === totalPages;
        nextBtn.style.opacity = activePage === totalPages ? '0.4' : '1';
        nextBtn.addEventListener("click", () => {
            if (activePage < totalPages) updateData(activePage + 1);
        });
        paginationDiv.appendChild(nextBtn);
    }

    function getNameLocation(gid) {
        return locations.find(l => {
            return groups.filter(g => {
                return parseInt(g.id) === gid;
            })
        }).name;
    }

    function getNameGroup(id) {
        return groups.find(g => {
            return parseInt(g.id) === id;
        }).name;
    }

    function setRefreshTime() {
        const inputRefresh = document.getElementById('input-refresh');
        const refreshTime = parseInt(inputRefresh.value, 10);
        if (isNaN(refreshTime) || refreshTime < 1 || refreshTime > 60) {
            alertMessages('error', 'Error', 'Please enter a valid refresh time between 1 and 30 seconds.');
            return;
        }
        clearInterval(refreshIntervalId);

        console.log("Setting refresh time to:", refreshTime);

        refreshIntervalId = setInterval(async () => {
            await process();
        }, refreshTime * 1000);
    }
</script>
