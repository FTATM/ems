<script>
    function redirect(target) {
        window.location.href = "../pages/" + target + ".php";
    }


    function showLoading() {
        if (document.getElementById('loading-overlay')) return; // ป้องกันซ้อนซ้ำ

        const overlay = document.createElement('div');
        overlay.id = 'loading-overlay';

        const spinner = document.createElement('div');
        spinner.id = 'loading-spinner';

        overlay.appendChild(spinner);
        document.body.appendChild(overlay);
    }

    function hideLoading() {
        const overlay = document.getElementById('loading-overlay');
        if (overlay) {
            overlay.remove();
        }
    }

    function showLoading(id) {
        const el = document.getElementById(id);
        if (!el) return;

        if (el.querySelector('.loading-overlay')) return;

        const overlay = document.createElement('div');
        overlay.className = 'loading-overlay';

        const spinner = document.createElement('div');
        spinner.className = 'loading-spinner';

        overlay.appendChild(spinner);
        el.appendChild(overlay);
    }

    function hideLoading(id) {
        const el = document.getElementById(id);
        if (!el) return;

        const overlay = el.querySelector('.loading-overlay');
        if (overlay) overlay.remove();
    }

    function alertMessages(icontxt = 'warning', titletxt = "Default title text.", textmessage = 'Default txt message.', timerShow = 1500, confirmbtn = false) {
        Swal.fire({
            icon: icontxt,
            title: titletxt,
            text: textmessage,
            timer: timerShow,
            showConfirmButton: confirmbtn
        });
        window.history.replaceState({}, document.title, window.location.pathname);
    }

    function setSession(key, value) {
        return fetch("../components/set-session.php", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: "key=" + key + "&value=" + value
        })
            .then(res => res.json())
            .then(data => {
                return true;
            })
            .catch(e => {
                alertMessages('error', 'Error set session', "Set session error please contact administrators.");
                console.error("error set session : ", e);
                return false;
            })
    }

    function formatDateTime(date) {
        const pad = (n) => n.toString().padStart(2, '0');

        return date.getFullYear() + '-' +
            pad(date.getMonth() + 1) + '-' +
            pad(date.getDate()) + ' ' +
            pad(date.getHours()) + ':' +
            pad(date.getMinutes()) + ':' +
            pad(date.getSeconds());
    }

    function getNameLocation(gid) {
        const group = groups.find(g => String(g.id) === String(gid));
        if (!group) return '—';
        return locations.find(l => String(l.id) === String(group.location_id))?.name ?? '—';
    }

    function getNameGroup(id) {
        return groups.find(g => String(g.id) === String(id))?.name ?? '—';
    }

    function generateOption(id, data, selectfirst = true) {
        let select = document.getElementById(id);
        select.innerHTML = '<option value="">== <?=$lang["select"]?> ==</option>';

        data.forEach(row => {
            let option = document.createElement('option');
            option.value = row.id;
            option.textContent = `[${row.id}] ${row.name}`;
            select.appendChild(option);
        });

        if (selectfirst && data.length > 0) {
            select.value = data[0].id;
            MeterID = data[0].id;
        }

    }

    function setMeterID(id = 'select-meters') {
        let select = document.getElementById(id);
        if (!Number(select.value)) { return; }
        MeterID = Number(select.value);
    }
    function parseLocalDate(dateStr) {
        const [year, month, day] = dateStr.split('-').map(Number);
        return new Date(year, month - 1, day); // local time
    }

    function filterDateTime(dateID = null, timeID = null) {
        const dateel = dateID ? document.getElementById(dateID) : null;
        const timeel = timeID ? document.getElementById(timeID) : null;

        // safe value
        let dateValue = dateel && dateel.value ? dateel.value : null;
        let timeValue = timeel && timeel.value ? parseInt(timeel.value, 10) : 0;

        if (isNaN(timeValue)) timeValue = 0;

        // fallback date
        let dateselect = dateValue ? parseLocalDate(dateValue) : new Date();

        if (isNaN(dateselect.getTime())) {
            dateselect = new Date();
        }

        // คำนวณเวลา
        let selectedDateTime = new Date(dateselect.getTime() - timeValue * 60000);

        let lastdate = formatDateTime(selectedDateTime);

        console.log(lastdate);
        return lastdate;
    }

    async function fetchMeters(tid, gid) {
        let formfilter = new FormData();
        formfilter.append("tid", tid);
        formfilter.append("gid", gid);

        try {
            const res = await fetch("../config/fetch-meters-filter.php", {
                method: "POST",
                body: formfilter
            });
            const result = await res.json();
            return result.data;
        } catch (e) {
            console.error('error unknown file fetch-meters-filter.php : ', e.message);
            alertMessages('error', 'พบปัญหา', 'เกิดข้อผิดพลาดในการทำงานของสคริปต์ fetch-meters-filter กรุณาคัดลอกข้อความนี้และส่งต่อให้ผู้ดูแลระบบ', 4000, true);
            return [];
        }
    }

    async function fetchDataOfMeter(mid, tid, gid, startDateID = null, timeID = null, endDateID = null) {
        const startdate = filterDateTime(startDateID, timeID);
        const lastdate = filterDateTime(endDateID, null);

        console.log(startdate);
        console.log(lastdate);

        let formfilter = new FormData();
        formfilter.append("id", mid);
        formfilter.append("tid", tid);
        formfilter.append("gid", gid);
        formfilter.append("startdate", startdate);
