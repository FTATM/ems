<script>
    let meters = [];
    let meterWithData = [];
    let locations = [];
    let groups = [];
    let types = [];
    let result = ['1', '3'];
    let lastSelectValueTime = '0';
    let refreshIntervalId;

    let MeterID = 0;
    const typeMeterID = "<?=$_SESSION['tid'];?>";
    const groupID = "<?=$_SESSION['gid'];?>";

    /*
     * TYPE-OF-VALUE BUTTON CONFIG
     * แต่ละ entry ประกอบด้วย:
     *   id        — ตรงกับ type id จาก API (string)
     *   name      — ชื่อหลัก
     *   sub       — ชื่อย่อย (uppercase label)
     *   icon      — Bootstrap Icons class
     *   section   — กลุ่ม section (จะถูก render เป็น row แยกตาม category)
     *   wide      — (optional) ถ้า true จะ render เป็นปุ่มแถวเดียวแบบกว้าง
     *   cols      — (optional) จำนวน column ใน grid ของ section นี้ (default 3)
     */
    const TOV_CONFIG = [
        // ── Power ──
        { id: '1', name: 'kW', sub: 'POWER', icon: 'bi-lightning-charge-fill', section: 'power' },
        { id: '3', name: 'kVA', sub: 'APPARENT', icon: 'bi-lightning-charge-fill', section: 'power' },
        { id: '5', name: 'kVAR', sub: 'REACTIVE', icon: 'bi-lightning-fill', section: 'power' },
        { id: '2', name: 'kWh', sub: 'ENERGY', icon: 'bi-speedometer2', section: 'power' },
        { id: '4', name: 'kVAh', sub: 'REACTIVE H', icon: 'bi-speedometer2', section: 'power' },
        { id: '6', name: 'kVARh', sub: 'REACTIVE H', icon: 'bi-speedometer2', section: 'power' },
        // ── Voltage Phase-Neutral ──
        { id: '7', name: 'V A-N', sub: '', icon: 'bi-bar-chart-steps', section: 'vpn' },
        { id: '8', name: 'V B-N', sub: '', icon: 'bi-bar-chart-steps', section: 'vpn' },
        { id: '9', name: 'V C-N', sub: '', icon: 'bi-bar-chart-steps', section: 'vpn' },
        // ── Voltage Phase-Phase ──
        { id: '10', name: 'V A-B', sub: '', icon: 'bi-circle-fill', section: 'vpp' },
        { id: '11', name: 'V B-C', sub: '', icon: 'bi-circle-fill', section: 'vpp' },
        { id: '12', name: 'V C-A', sub: '', icon: 'bi-circle-fill', section: 'vpp' },
        // ── Current ──
        { id: '13', name: 'Curr A', sub: '', icon: 'bi-activity', section: 'current' },
        { id: '14', name: 'Curr B', sub: '', icon: 'bi-activity', section: 'current' },
        { id: '15', name: 'Curr C', sub: '', icon: 'bi-activity', section: 'current' },
        // ── Others ──
        { id: '16', name: 'Current Average', sub: '', icon: 'bi-bar-chart-line-fill', section: 'other', wide: true },
        { id: '17', name: 'Pf', sub: 'POWER FACTOR', icon: 'bi-sliders', section: 'other2' },
        { id: '18', name: 'Frequency', sub: 'ความถี่ (Hz)', icon: 'bi-soundwave', section: 'other2', cols: 2 },
    ];

    const TOV_SECTIONS = [
        { key: 'power', label: null },
        { key: 'vpn', label: 'VOLTAGE PHASE-NEUTRAL' },
        { key: 'vpp', label: 'VOLTAGE PHASE-PHASE' },
        { key: 'current', label: 'CURRENT' },
        { key: 'other', label: null, cols: 1 },
        { key: 'other2', label: null, cols: 2 },
    ];

    document.addEventListener("DOMContentLoaded", async () => {
        // showLoading();
        await fetchAll();
        setInformation();
        await generateOption('select-meters', Object.values(meters), true);
        setMeterID();
        await process();
        await setRefreshTime();
        // hideLoading();
    });

    async function process() {
        meterWithData = await fetchDataOfMeter(MeterID, typeMeterID, groupID, null, timeID = 'filter-lasttime');
        updateData(meterWithData);
        generateDataList();
    }

    async function fetchAll() {
        let res_location = await fetch("../config/fetch-locations.php");
        let json_location = await res_location.json();
        locations = json_location.data;

        let res_group = await fetch("../config/fetch-groups.php");
        let json_group = await res_group.json();
        groups = json_group.data;

        let responsetype = await fetch("../config/fetch-data_type.php");
        let jsontype = await responsetype.json();
        types = jsontype.data;

        meters = await fetchMeters(typeMeterID, groupID);
    }

    function setInformation() {
        const locate = document.getElementById('location');
        locate.innerHTML = `<?=$lang['location']?> : ` + getNameLocation(groupID);
        const group = document.getElementById('group');
        group.innerHTML = `<?=$lang['group']?> : ` + getNameGroup(groupID);
    }

    async function changeSelectMeter() {
        setMeterID();
        await process();
        setRefreshTime();
    }

    /* ─────────────────────────────────────────────
     *  generateInfomation — render vertical stacked layout
     * ───────────────────────────────────────────── */
    function generateInfomation(selectMeter) {
        const rows = [
            {
                label: 'METER NAME',
                value: selectMeter?.name ?? '—',
                icon: 'bi-card-text'
            },
            {
                label: 'STATUS',
                value: selectMeter?.is_active,
                icon: 'bi-phone',
                isStatus: true
            },
            {
                label: 'IP ADDRESS',
                value: selectMeter?.ip_address ?? '—',
                icon: 'bi-hdd-network'
            },
            {
                label: 'PROTOCOL',
                value: selectMeter?.protocol ?? '—',
                icon: 'bi-modem'
            },
            {
                label: 'SLAVE ID',
                value: selectMeter?.slave_id ?? '—',
                icon: 'bi-123'
            },
        ];

        const isDark = document.documentElement.classList.contains('dark');
        const colorValue = isDark ? '#deeacc' : '#1c2214';
        const colorMuted = isDark ? '#607048' : '#7a8f60';
        const colorIcon = isDark ? '#607048' : '#7a8f60';
        const colorBorder = isDark ? '#283820' : '#d8e4c8';

        const cells = rows.map((row, idx) => {
            let valueHtml;
            if (row.isStatus) {
                const isOn = parseInt(row.value) === 1;
                valueHtml = `
                    <span class="info-status-badge ${isOn ? 'info-status--on' : 'info-status--off'}">
                        <span class="info-status-dot"></span>
                        ${isOn ? 'Active' : 'Inactive'}
                    </span>`;
            } else {
                valueHtml = `<div class="info-vstack-value" style="color:${colorValue} !important;font-size:13px;font-weight:600;line-height:1.3;">${row.value}</div>`;
            }

            const divider = idx < rows.length - 1
                ? `<div class="info-vstack-divider" style="height:1px;background:${colorBorder};margin:0 14px;"></div>`
                : '';

            return `
                <div class="info-vstack-item" style="display:flex;flex-direction:column;align-items:flex-start;gap:3px;padding:10px 14px;">
                    <div style="display:flex;align-items:center;gap:6px;">
                        <i class="bi ${row.icon}" style="font-size:13px;color:${colorIcon} !important;"></i>
                        <div class="info-vstack-label" style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:${colorMuted} !important;">${row.label}</div>
                    </div>
                    ${valueHtml}
                </div>${divider}`;
        }).join('');

        const wrapper = document.createElement('div');
        wrapper.className = 'info-vstack-list';
        Object.assign(wrapper.style, {
            display: 'flex', flexDirection: 'column',
            width: '100%', boxSizing: 'border-box', padding: '4px 0',
        });
        wrapper.innerHTML = cells;
        document.getElementById('infomation').innerHTML = '';
        document.getElementById('infomation').appendChild(wrapper);
    }

    /* ─────────────────────────────────────────────
     *  generateDataList — render Type of Value grid
     * ───────────────────────────────────────────── */
    function applyGridStyle(el, cols) {
        const colMap = { 1: '1fr', 2: 'repeat(2,1fr)', 3: 'repeat(3,1fr)' };
        Object.assign(el.style, {
            display: 'grid',
            gridTemplateColumns: colMap[cols] || 'repeat(3,1fr)',
            gap: '5px',
            marginBottom: '6px',
            width: '100%',
            boxSizing: 'border-box',
        });
    }

    function generateDataList() {
        const listdata = document.getElementById('list-data');
        listdata.innerHTML = '';

        Object.assign(listdata.style, {
            display: 'block',
            flexWrap: 'unset',
            gap: 'unset',
            alignItems: 'unset',
            padding: '0',
            width: '100%',
            boxSizing: 'border-box',
        });

        if (!types || types.length === 0) return;

        const normalize = s => String(s).toLowerCase().replace(/[\s\-_]/g, '');

        const apiById = {};
        const apiByName = {};
        types.forEach(t => {
            apiById[String(t.id)] = t;
            apiByName[normalize(t.name)] = t;
        });

        const matchedApiIds = new Set();
        const resolvedConfig = TOV_CONFIG.map(cfg => {
            if (apiById[cfg.id]) {
                matchedApiIds.add(String(cfg.id));
                return { ...cfg, realId: String(cfg.id) };
            }
            const apiRow = apiByName[normalize(cfg.name)];
            if (apiRow) {
                matchedApiIds.add(String(apiRow.id));
                return { ...cfg, realId: String(apiRow.id) };
            }
            return null;
        }).filter(Boolean);

        const sectionMap = {};
        TOV_SECTIONS.forEach(s => { sectionMap[s.key] = []; });
        resolvedConfig.forEach(cfg => {
            if (sectionMap[cfg.section] !== undefined) {
                sectionMap[cfg.section].push(cfg);
            }
        });

        const extraTypes = types.filter(t => !matchedApiIds.has(String(t.id)));

        TOV_SECTIONS.forEach((section, sectionIdx) => {
            const items = sectionMap[section.key];
            if (!items || items.length === 0) return;

            const sectionDiv = document.createElement('div');
            sectionDiv.className = 'tov-section';
            Object.assign(sectionDiv.style, {
                display: 'block',
                width: '100%',
                boxSizing: 'border-box',
                padding: '8px 10px 2px',
                borderTop: sectionIdx > 0 ? '1px solid var(--border)' : 'none',
            });

            if (section.label) {
                const catLabel = document.createElement('span');
                catLabel.className = 'tov-cat-label';
                catLabel.textContent = section.label;
                Object.assign(catLabel.style, {
                    display: 'block',
                    fontSize: '9px',
                    fontWeight: '700',
                    textTransform: 'uppercase',
                    letterSpacing: '0.08em',
                    color: 'var(--text-muted)',
                    padding: '4px 2px 6px',
                });
                sectionDiv.appendChild(catLabel);
            }

            const cols = section.cols ?? 3;
            const gridDiv = document.createElement('div');
            gridDiv.className = `tov-grid tov-grid--${cols === 1 ? '1' : cols === 2 ? '2' : '3'}`;
            applyGridStyle(gridDiv, cols);

            items.forEach(cfg => {
                gridDiv.appendChild(buildTovButton({ ...cfg, id: cfg.realId }));
            });

            sectionDiv.appendChild(gridDiv);
            listdata.appendChild(sectionDiv);
        });

        if (extraTypes.length > 0) {
            const sectionDiv = document.createElement('div');
            sectionDiv.className = 'tov-section';
            Object.assign(sectionDiv.style, {
                display: 'block', width: '100%', boxSizing: 'border-box',
                padding: '8px 10px 2px', borderTop: '1px solid var(--border)',
            });

            const gridDiv = document.createElement('div');
            gridDiv.className = 'tov-grid tov-grid--3';
            applyGridStyle(gridDiv, 3);

            extraTypes.forEach(t => {
                gridDiv.appendChild(buildTovButton({
                    id: String(t.id), name: t.name,
                    sub: '', icon: 'bi-dash-circle', section: 'extra'
                }));
            });

            sectionDiv.appendChild(gridDiv);
            listdata.appendChild(sectionDiv);
        }
    }

    function buildTovButton(cfg) {
        const isActive = result.includes(cfg.id);
        const isWide = !!cfg.wide;

        const btn = document.createElement('button');
        btn.setAttribute('data-id', cfg.id);
        btn.className = 'tov-btn' + (isWide ? ' tov-btn--wide' : '') + (isActive ? ' active' : '');

        Object.assign(btn.style, {
            display: 'flex',
            flexDirection: isWide ? 'row' : 'column',
            alignItems: 'center',
            justifyContent: isWide ? 'flex-start' : 'center',
            gap: isWide ? '10px' : '4px',
            padding: isWide ? '8px 12px' : '7px 4px 6px',
            borderRadius: '8px',
            border: isActive ? '1.5px solid var(--green)' : '1.5px solid var(--border)',
            background: isActive ? 'var(--green-light)' : 'var(--bg-card)',
            cursor: 'pointer',
            minHeight: isWide ? '40px' : '54px',
            width: '100%',
            boxSizing: 'border-box',
            margin: '0',
            fontSize: 'inherit',
            fontWeight: 'inherit',
            transition: 'border-color 0.15s, background 0.15s',
            position: 'relative',
            overflow: 'hidden',
            textAlign: 'center',
        });

        const iconDiv = document.createElement('div');
        iconDiv.className = 'tov-icon';
        Object.assign(iconDiv.style, {
            width: '26px',
            height: '26px',
            minWidth: '26px',
            borderRadius: '6px',
            background: isActive ? 'rgba(139,174,102,0.25)' : 'var(--bg-select)',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            flexShrink: '0',
        });

        const icon = document.createElement('i');
        icon.className = `bi ${cfg.icon}`;
        Object.assign(icon.style, {
            fontSize: '12px',
            lineHeight: '1',
            color: isActive ? 'var(--green)' : 'var(--text-muted)',
        });
        iconDiv.appendChild(icon);

        const nameSpan = document.createElement('span');
        nameSpan.className = 'tov-name';
        nameSpan.textContent = cfg.name;
        Object.assign(nameSpan.style, {
            fontSize: isWide ? '12px' : '11px',
            fontWeight: '700',
            color: isActive ? 'var(--green-dark)' : 'var(--text-primary)',
            textAlign: isWide ? 'left' : 'center',
            lineHeight: '1.1',
        });

        btn.appendChild(iconDiv);
        btn.appendChild(nameSpan);

        if (cfg.sub) {
            const subSpan = document.createElement('span');
            subSpan.className = 'tov-sub';
            subSpan.textContent = cfg.sub;
            Object.assign(subSpan.style, {
                fontSize: '8px',
                fontWeight: '600',
                textTransform: 'uppercase',
                letterSpacing: '0.05em',
                color: isActive ? 'var(--green)' : 'var(--text-muted)',
                textAlign: 'center',
                lineHeight: '1.1',
            });
            btn.appendChild(subSpan);
        }

        btn.addEventListener('click', function () {
            const id = cfg.id;
            let active;
            if (result.includes(id)) {
                result = result.filter(item => item !== id);
                btn.classList.remove('active');
                active = false;
            } else {
                result.push(id);
                btn.classList.add('active');
                active = true;
            }
            btn.style.border = active ? '1.5px solid var(--green)' : '1.5px solid var(--border)';
            btn.style.background = active ? 'var(--green-light)' : 'var(--bg-card)';
            iconDiv.style.background = active ? 'rgba(139,174,102,0.25)' : 'var(--bg-select)';
            icon.style.color = active ? 'var(--green)' : 'var(--text-muted)';
            nameSpan.style.color = active ? 'var(--green-dark)' : 'var(--text-primary)';

            updateData(meterWithData);
        });

        return btn;
    }

    function setRefreshTime() {
        const inputRefresh = document.getElementById('input-refresh');
        const refreshTime = parseInt(inputRefresh.value, 10);
        if (isNaN(refreshTime) || refreshTime < 1 || refreshTime > 60) {
            alertMessages('error', 'Error', 'Please enter a valid refresh time between 1 and 30 seconds.');
            return;
        }
        clearInterval(refreshIntervalId);
        // console.log("Setting refresh time to:", refreshTime);
        refreshIntervalId = setInterval(() => {
            process();
        }, refreshTime * 1000);
    }

    // ======== Chart.js helpers ========

    /* อ่าน CSS variable */
    function getCssVar(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    /* โทนสีเขียว */
    function getRandomColor(index) {
        const isDark = document.documentElement.classList.contains('dark');
        const colors = isDark ? [
            "#8BAE66", "#A8C87A", "#6e9248", "#C2DC9A", "#5a7a3a",
            "#B5D488", "#7FA055", "#D4EBB0", "#4d6832", "#9BC070",
            "#E0F2C8", "#638C40", "#AECF80", "#3d5628", "#C8E4A0",
            "#82A85E", "#B8D890", "#527838"
        ] : [
            "#6e9248", "#8BAE66", "#4d6832", "#A8C87A", "#3d5628",
            "#7FA055", "#527838", "#B5D488", "#638C40", "#5a7a3a",
            "#9BC070", "#405e28", "#C2DC9A", "#2e4820", "#AECF80",
            "#6e9248", "#82A85E", "#344e1e"
        ];
        return colors[index % colors.length];
    }

    /* อ่าน theme จาก CSS variables */
    function getChartTheme() {
        const isDark = document.documentElement.classList.contains('dark');
        return {
            bgColor: getCssVar('--bg-card'),
            textColor: getCssVar('--text-primary'),
            mutedColor: getCssVar('--text-muted'),
            gridColor: getCssVar('--border'),
            tooltipBg: isDark ? getCssVar('--bg-select') : '#ffffff',
            tooltipBorder: getCssVar('--green'),
            legendColor: getCssVar('--text-secondary'),
        };
    }

    /* format date → "DD Mon YYYY HH:mm:ss" */
    function formatDate(d) {
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const pad = n => String(n).padStart(2, '0');
        return `${pad(d.getDate())} ${months[d.getMonth()]} ${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    /* เก็บ Chart instance ไว้ destroy ก่อน render ใหม่ */
    const _chartInstances = {};

    function _destroyChart(id) {
        if (_chartInstances[id]) {
            _chartInstances[id].destroy();
            delete _chartInstances[id];
        }
    }

    /* สร้าง <canvas> ใน container (ล้างเก่าก่อน) */
    function _getCanvas(containerId) {
        const wrap = document.getElementById(containerId);
        wrap.innerHTML = '';
        const canvas = document.createElement('canvas');
        wrap.appendChild(canvas);
        return canvas;
    }

    // ======== prepare Data ========

    function prepareLinearData(SelectedFilterMeter, columnIndex) {
        const rawData = SelectedFilterMeter.data?.[columnIndex];
        if (!rawData || !Array.isArray(rawData) || rawData.length === 0) return null;
        return {
            label: getLabelFromIndex(columnIndex),
            data: rawData.map(row => ({
                x: new Date(row.create_date.replace(' ', 'T')),
                y: parseFloat(row.value) || 0
            })),
            color: getRandomColor(columnIndex)
        };
    }

    function prepareLinearPrice(SelectedFilterMeter) {
        const rawData = SelectedFilterMeter.data?.[2];
        if (!rawData || !Array.isArray(rawData) || rawData.length === 0) return null;
        const { powerData } = calculateElectricCost(rawData, 4);
        return {
            label: 'Price (฿)',
            data: powerData.map(p => ({ x: p.x, y: p.y })),
            color: getRandomColor(2)
        };
    }

    function preparePieData(SelectedFilterMeter, columnIndex) {
        const rawData = SelectedFilterMeter.data?.[columnIndex];
        if (!rawData || !Array.isArray(rawData) || rawData.length === 0) return null;
        const total = rawData.reduce((s, r) => s + (parseFloat(r.value) || 0), 0);
        const avg = total / rawData.length;
        return {
            label: `${SelectedFilterMeter.name} - ${getLabelFromIndex(columnIndex)}`,
            value: parseFloat(avg.toFixed(2)),
            color: getRandomColor(columnIndex)
        };
    }

    function calculateElectricCost(dataArray, pricePerKWh) {
        let totalCost = 0;
        let defaultkWh = dataArray[0].value;
        const powerData = dataArray.map(row => {
            const powerKWh = parseFloat(row.value - defaultkWh) * 120 || 0;
            defaultkWh = row.value;
            totalCost += powerKWh * pricePerKWh;
            return { x: new Date(row.create_date.replace(' ', 'T')), y: powerKWh };
        });
        const averageCost = dataArray.length > 0 ? totalCost / dataArray.length : 0;
        return { powerData, averageCost: averageCost.toFixed(2) };
    }

    function getLabelFromIndex(index) {
        const found = types.find(r => r['id'] == index);
        return found ? found['name'] : 'unknown';
    }

    // ======== updateData (ใช้ format ใหม่) ========
    async function updateData(filteredDataInMeters) {

        const selectedMeter = filteredDataInMeters[MeterID];

        console.log(selectedMeter);


        if (lastSelectValueTime !== MeterID && (selectedMeter?.data['1']?.length ?? 0) < 1) {
            alertMessages('warning', "No Data Available", "No data was found for the selected period. Please choose a different timeframe.", 5000, true);
            lastSelectValueTime = MeterID;
        }

        generateInfomation(selectedMeter);

        // ── Line chart (kW / kVAR) ──
        const lineDatasets = result
            .map(index => prepareLinearData(selectedMeter, index))
            .filter(Boolean);
        createLinearChart('chart-linear', 'กราฟการใช้พลังงาน (kW)', lineDatasets);

        // ── Pie chart ──
        const pieItems = result
            .map(index => preparePieData(selectedMeter, index))
            .filter(Boolean);
        createPieChart('chart-Pie', 'สัดส่วนการใช้พลังงาน', pieItems);

        // ── Price chart ──
        const priceItem = prepareLinearPrice(selectedMeter);
        createLinearChart('chart-linear-price', 'ค่าไฟฟ้า (บาท)', priceItem ? [priceItem] : []);
    }

    // ======== Chart.js render functions ========
    function createLinearChart(containerId, title, datasets) {
        const t = getChartTheme();
        _destroyChart(containerId);
        const canvas = _getCanvas(containerId);

        const chartDatasets = datasets.map(ds => ({
            label: ds.label,
            data: ds.data,
            borderColor: ds.color,
            backgroundColor: ds.color + '22',
            borderWidth: 2,
            pointRadius: 0,
            pointHoverRadius: 4,
            tension: 0.3,
            fill: false,
        }));

        _chartInstances[containerId] = new Chart(canvas, {
            type: 'line',
            data: { datasets: chartDatasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: {
                        display: true,
                        position: 'top',
                        labels: {
                            color: t.legendColor,
                            font: { size: 12 },
                            boxWidth: 12,
                            padding: 12,
                            usePointStyle: true,
                        }
                    },
                    tooltip: {
                        backgroundColor: t.tooltipBg,
                        borderColor: t.tooltipBorder,
                        borderWidth: 1,
                        titleColor: t.textColor,
                        bodyColor: t.mutedColor,
                        titleFont: { weight: 'bold', size: 12 },
                        bodyFont: { size: 12 },
                        padding: 10,
                        callbacks: {
                            title: items => formatDate(new Date(items[0].parsed.x)),
                            label: item => ` ${item.dataset.label}: ${item.parsed.y.toLocaleString(undefined, { maximumFractionDigits: 2 })}`
                        }
                    },
                },
                scales: {
                    x: {
                        type: 'time',
                        time: {
                            tooltipFormat: 'dd MMM yyyy HH:mm:ss',
                            displayFormats: { minute: 'HH:mm', hour: 'HH:mm', day: 'dd MMM' }
                        },
                        ticks: { color: t.mutedColor, font: { size: 11 }, maxRotation: 0 },
                        grid: { color: t.gridColor },
                        border: { color: t.gridColor },
                    },
                    y: {
                        ticks: { color: t.mutedColor, font: { size: 11 } },
                        grid: { color: t.gridColor },
                        border: { color: t.gridColor },
                    }
                }
            }
        });
    }

    function createPieChart(containerId, title, items) {
        const t = getChartTheme();
        _destroyChart(containerId);
        const canvas = _getCanvas(containerId);

        _chartInstances[containerId] = new Chart(canvas, {
            type: 'doughnut',
            data: {
                labels: items.map(i => i.label),
                datasets: [{
                    data: items.map(i => i.value),
                    backgroundColor: items.map(i => i.color + 'cc'),
                    borderColor: items.map(i => i.color),
                    borderWidth: 2,
                    hoverOffset: 6,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                cutout: '60%',
                plugins: {
                    legend: {
                        display: true,
                        position: 'bottom',
                        labels: {
                            color: t.legendColor,
                            font: { size: 11 },
                            boxWidth: 12,
                            padding: 10,
                            usePointStyle: true,
                        }
                    },
                    tooltip: {
                        backgroundColor: t.tooltipBg,
                        borderColor: t.tooltipBorder,
                        borderWidth: 1,
                        titleColor: t.textColor,
                        bodyColor: t.mutedColor,
                        callbacks: {
                            label: item => {
                                const val = item.parsed;
                                const total = item.dataset.data.reduce((a, b) => a + b, 0);
                                const pct = total > 0 ? ((val / total) * 100).toFixed(1) : 0;
                                return ` ${item.label}: ${val.toLocaleString(undefined, { maximumFractionDigits: 2 })} (${pct}%)`;
                            }
                        }
                    },
                }
            }
        });
    }
</script>
