<script>
    let meters = [];
    let locations = [];
    let groups = [];
    let types = [];

    const typeMeterID = "<?=$_SESSION['tid'];?>";
    const groupID = "<?=$_SESSION['gid'];?>";

    document.addEventListener("DOMContentLoaded", async () => {
        await fetchAll();
        await process();
        setInterval(() => {
            process();
        }, 5000);
    });

    async function process() {
        meters = await fetchRealtimeOfMeters(typeMeterID, groupID);
        await generateMeters();
        await setInformation();
    };

    async function fetchAll() {
        let res_location = await fetch("../config/fetch-locations.php");
        let json_location = await res_location.json();
        locations = json_location.data;

        let res_group = await fetch("../config/fetch-groups.php");
        let json_group = await res_group.json();
        groups = json_group.data;

        let responsetype = await fetch("../config/fetch-data_type.php");
        let jsontype = await responsetype.json();
        types = jsontype.data;

    }

    function setInformation() {
        const locate = document.getElementById('location');
        locate.innerHTML = `<?=$lang['location']?> : ` + getNameLocation(groupID);
        const group = document.getElementById('group');
        group.innerHTML = `<?=$lang['group']?> : ` + getNameGroup(groupID);
    }

    function generateMeters() {
        let list = document.getElementById('list-meters');
        list.innerHTML = ``;

        // แบ่งเป็นแถวละ 8 ตัว
        const itemsPerRow = 8;

        Object.values(meters).forEach((m, index) => {
            if (index % itemsPerRow === 0) {
                let row = document.createElement('div');
                row.className = "mx-3 bg-diagram-body d-flex align-items-end justify-content-end"; // จัดเรียง meter ในแถว
                row.style.minHeight = "280px";
                row.innerHTML = `
                    <div id="row-${Math.floor(index / itemsPerRow)}" class="d-flex flex-wrap justify-content-between align-items-end me-3" style="width:93%;">
                    </div>
                `;
                list.appendChild(row);
            }

            const dataMap = Object.fromEntries(
                m.data.map(d => [d.type_id, d])
            );

            const getVal = (id) => parseFloat(dataMap[id]?.value) || 0;

            let strkw = getVal('1').toFixed(2);
            let strkwh = getVal('2').toFixed(2);
            let stran = getVal('7').toFixed(2);
            let strab = getVal('14').toFixed(2);
            let strfq = getVal('18').toFixed(2);
            let strca = getVal('10').toFixed(2);
            let strpf = getVal('17').toFixed(2);
            let [intPartkw, decimalPartkw] = strkw.split(".");
            let [intPartkwh, decimalPartkwh] = strkwh.split(".");
            let [intPartan, decimalPartan] = stran.split(".");
            let [intPartab, decimalPartab] = strab.split(".");
            let [intPartfq, decimalPartfq] = strfq.split(".");
            let [intPartca, decimalPartca] = strca.split(".");
            let [intPartpf, decimalPartpf] = strpf.split(".");

            let digitskw = (intPartkw.padStart(5, "0") + "." + decimalPartkw).split("");
            let digitskwh = (intPartkwh.padStart(5, "0") + "." + decimalPartkwh).split("");
            let digitsan = (intPartan.padStart(3, "0") + "." + decimalPartan).split("");
            let digitsab = (intPartab.padStart(3, "0") + "." + decimalPartab).split("");
            let digitsfq = (intPartfq.padStart(3, "0") + "." + decimalPartfq).split("");
            let digitsca = (intPartca.padStart(3, "0") + "." + decimalPartca).split("");
            let digitspf = (intPartpf.padStart(3, "0") + "." + decimalPartpf).split("");

            wrapper.style.width = "150px";
            wrapper.style.height = "170px";
            wrapper.style.marginRight = index === (Math.floor(index / itemsPerRow) * 8) + 3 ? "120px" : "0px";
            wrapper.style.overflow = "hidden";
            wrapper.style.display = "inline-block";

            div.style.width = "320px";
            div.style.height = "360px";
            div.style.backgroundColor = "#EFEFEF";
            div.style.transform = "scale(0.45)";
            div.style.transformOrigin = "top left";

            div.innerHTML = `

                    <div class="w-100 h-100 px-1 py-3 rounded position-relative" style="background-color:#666666;">
                        <div id="status-${index}" class="position-absolute rounded-circle bg-danger p-2" style="top:20px; right:10px;">
                        </div>
                        <div class="w-100 h-100 p-2 d-flex flex-column rounded" style="background-color:#EFEFEF;">
                            <div class="w-100 mb-1 d-flex justify-content-center align-content-center">
                                <div class="w-100 d-flex justify-content-center align-items-center">
                                    <div class="w-75 d-flex justify-content-end">
                                        ${digitskw.map(d => `<div class="slot-number">${d}</div>`).join("")}
                                    </div>
                                    <div class="text-black ms-2 w-25">kW</div>
                                </div>
                            </div>
                            <div class="w-100 mb-1 d-flex justify-content-center align-content-center">
                                <div class="w-100 d-flex justify-content-center align-items-center">

                                        ${digitskwh.map(d => `<div class="slot-number">${d}</div>`).join("")}
                                    </div>
                                    <div class="text-black ms-2 w-25">kW·h</div>
                                </div>
                            </div>
                            <div class="w-100 h-25 text-black text-center">
                                <div id="line-active-${m.id}" class="stop-line"></div>
                            </div>
                            <div class="w-100 mb-3 d-flex justify-content-center align-content-center">
                                <div class="w-50 d-flex flex-column justify-content-center align-items-center">
                                    <div class="text-black w-25">A-N</div>
                                    <div class="w-75 d-flex justify-content-end">
                                        ${digitsan.map(d => `<div class="slot-number">${d}</div>`).join("")}
                                        <div class="text-black ms-1 w-25">V</div>
                                    </div>
                                </div>
                                <div class="w-50 d-flex flex-column justify-content-center align-items-center">
                                    <div class="text-black w-25">A-B</div>
                                    <div class="w-75 d-flex justify-content-end">
                                        ${digitsab.map(d => `<div class="slot-number">${d}</div>`).join("")}
                                        <div class="text-black ms-1 w-25">V</div>
                                    </div>
                                </div>
                            </div>
                            <div class="w-100 mb-1 d-flex justify-content-center align-content-center">
                                <div class="w-100 d-flex justify-content-center align-items-center">
                                    <div class="w-75 d-flex justify-content-end">
                                        <div class="text-black w-25">Cur-A</div>
                                        ${digitsca.map(d => `<div class="slot-number">${d}</div>`).join("")}
                                    </div>
                                    <div class="text-black ms-1 w-25">A</div>
                                </div>
                            </div>
                            <div class="w-100 mb-1 d-flex justify-content-center align-content-center">
                                <div class="w-100 d-flex justify-content-center align-items-center">
                                    <div class="w-75 d-flex justify-content-end">
                                    <div class="text-black w-25">PF</div>
                                    ${digitspf.map(d => `<div class="slot-number">${d}</div>`).join("")}
                                    </div>
                                    <div class="text-black ms-1 w-25"></div>
                                </div>
                            </div>
                            <div class="w-100 mb-1 d-flex justify-content-center align-content-center">
                                <div class="w-100 d-flex justify-content-center align-items-center">
                                    <div class="w-75 d-flex justify-content-end">
                                    <div class="text-black w-25">Fq</div>
                                    ${digitsfq.map(d => `<div class="slot-number">${d}</div>`).join("")}
                                    </div>
                                    <div class="text-black ms-1 w-25">Hz</div>
                                </div>
                            </div>
                            <div class="text-black text-center fw-bold fs-5">
                                ${m.name}
                            </div>
                        </div>
                    </div>
                </div>
            `;
            wrapper.appendChild(div);

            // หา row ล่าสุด แล้วเพิ่ม meter เข้าไป
            let currentRow = document.getElementById(`row-${Math.floor(index / itemsPerRow)}`);
            currentRow.appendChild(wrapper);

            if (m.data.length > 0) {
                let now = new Date();
                let time1mins = new Date(now.getTime() - parseInt(1, 10) * 60000);
                let create_date = new Date(m.data[0].create_date);
                if (create_date >= time1mins) {
                    document.getElementById(`line-active-${m.id}`).classList.remove('stop-line');
                    document.getElementById(`line-active-${m.id}`).classList.add('moving-line');
                    document.getElementById('status-' + index).classList.replace("bg-danger", "bg-success");
                }
            }
        });
    }

    function renderTablePage(data, page) {

        renderPagination(data.length, page);
    }

    function renderPagination(totalRows, currentPage) {
        const paginationDiv = document.getElementById("pagination");
        paginationDiv.innerHTML = "";

        const totalPages = Math.ceil(totalRows / rowsPerPage);

        for (let i = 1; i <= totalPages; i++) {
            const btn = document.createElement("button");
            btn.className = `btn btn-sm text-white`;
            btn.style.backgroundColor = `${i === currentPage ? '#001B5E' : '#555555'}`;

            btn.textContent = i;
            btn.addEventListener("click", () => {
                renderTablePage(locations, i);
            });
            paginationDiv.appendChild(btn);
        }
    }
