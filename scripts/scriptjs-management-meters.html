    /* ── Lang ── */

    /* ── Modal Notification System ── */
    (function () {
        const css = `

            position: fixed; inset: 0; z-index: 99990;
            background: rgba(0,0,0,.45);

        #ems-modal-close-btn {

        #ems-modal-card.mod-blue    #ems-modal-close-btn { background: #3b82f6; color: #fff; }
        #ems-modal-card.mod-error   #ems-modal-close-btn { background: #ef4444; color: #fff; }
        #ems-modal-card.mod-info    #ems-modal-close-btn { background: #3b82f6; color: #fff; }
        #ems-modal-card.mod-warning #ems-modal-close-btn { background: #f59e0b; color: #fff; }

        /* ── X close icon (top-right) ── */
        #ems-modal-x {
            position: absolute; top: 0.75rem; right: 0.85rem;
            width: 28px; height: 28px;
            border-radius: 50%; border: none; background: transparent;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: var(--text-muted, #9ca3af);
            font-size: 1.1rem; line-height: 1;
            transition: background 0.15s ease, color 0.15s ease;
        }
        #ems-modal-x:hover { background: var(--border, #e5e7eb); color: var(--text-body, #374151); }

        /* ── Auto-close progress bar ── */
        .ems-modal-progress {
            height: 3px;
            background: linear-gradient(90deg, var(--primary,#8BAE66), transparent);
            transform-origin: left;
            animation: modalProgress linear forwards;
        }
        @keyframes modalProgress { from { transform: scaleX(1); } to { transform: scaleX(0); } }

        /* ── Decorative circles (subtle, like notallow page style) ── */
        .ems-modal-deco {
            position: absolute; border-radius: 50%; pointer-events: none;
        }
        `;
        const st = document.createElement('style');
        st.textContent = css;
        document.head.appendChild(st);

        // Build DOM
        const overlay = document.createElement('div');
        overlay.id = 'ems-modal-overlay';
        overlay.innerHTML = `
            <div id="ems-modal-card">
                <button id="ems-modal-x" onclick="closeEmsModal()" aria-label="Close">&#x2715;</button>
                <div id="ems-modal-progress-wrap"></div>
                <div class="ems-modal-body">
                    <div class="ems-modal-icon-wrap" id="ems-modal-icon"></div>
                    <div class="ems-modal-action-badge" id="ems-modal-badge"></div>
                    <p class="ems-modal-title" id="ems-modal-title"></p>
                    <p class="ems-modal-desc"  id="ems-modal-desc"></p>
                </div>
                <div class="ems-modal-footer">
                    <button id="ems-modal-close-btn" onclick="closeEmsModal()">${_lang['ok']}</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);
        overlay.addEventListener('click', (e) => { if (e.target === overlay) closeEmsModal(); });
    })();

    let _emsModalTimer = null;

    /* ── SVG icons per type ── */
    const _emsIcons = {
        success: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
        error:   `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
        blue:    `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/><circle cx="12" cy="3" r="1" fill="currentColor" stroke="none"/></svg>`,
        info:    `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
        warning: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
    };

    /* ── Action badge labels ── */
    const _emsBadgeLabels = {
        save:     (_lang['badge_save']    || 'บันทึกข้อมูล'),
        update:   (_lang['badge_update']  || 'อัพเดต'),
        create:   (_lang['badge_create']  || 'สร้างใหม่'),
        delete:   (_lang['badge_delete']  || 'ลบ'),
        enable:   (_lang['badge_enable']  || 'เปิดการแจ้งเตือน'),
        disable:  (_lang['badge_disable'] || 'ปิดการแจ้งเตือน'),
        connect:  (_lang['badge_connect'] || 'ทดสอบการเชื่อมต่อ'),
        error:    (_lang['badge_error']   || 'เกิดข้อผิดพลาด'),
    };

    function showEmsModal(type, action, title, desc, autoDuration = 3500) {
        const overlay = document.getElementById('ems-modal-overlay');
        const card    = document.getElementById('ems-modal-card');
        if (!overlay || !card) return;

        // Reset type class
        card.className = 'mod-' + type;

        // Always restore footer (may have been replaced by showEmsConfirm)
        const footer = overlay.querySelector(".ems-modal-footer");
        if (footer && !document.getElementById("ems-modal-close-btn")) {
            footer.innerHTML = `<button id="ems-modal-close-btn" onclick="closeEmsModal()">${_lang['ok']}</button>`;
        }

        // Populate
        document.getElementById('ems-modal-icon').innerHTML  = _emsIcons[type] || _emsIcons.info;
        document.getElementById('ems-modal-badge').textContent = _emsBadgeLabels[action] || action;
        document.getElementById('ems-modal-title').textContent = title;
        document.getElementById('ems-modal-desc').textContent  = desc;

        // Progress bar
        const pw = document.getElementById('ems-modal-progress-wrap');
        pw.innerHTML = '';
        if (autoDuration > 0) {
            const bar = document.createElement('div');
            bar.className = 'ems-modal-progress';
            bar.style.animationDuration = autoDuration + 'ms';
            pw.appendChild(bar);
        }

        // Show
        overlay.classList.add('show');
        document.body.style.overflow = 'hidden';

        // Clear old timer
        if (_emsModalTimer) { clearTimeout(_emsModalTimer); _emsModalTimer = null; }
        if (autoDuration > 0) {
            _emsModalTimer = setTimeout(closeEmsModal, autoDuration);
        }
    }

    function closeEmsModal() {
        const overlay = document.getElementById('ems-modal-overlay');
        if (!overlay) return;
        overlay.classList.remove('show');
        document.body.style.overflow = '';
        if (_emsModalTimer) { clearTimeout(_emsModalTimer); _emsModalTimer = null; }
    }

    /**
     * showEmsConfirm — confirm dialog with Cancel / Confirm buttons
     * @param {string}   title      - headline
     * @param {string}   desc       - sub description
     * @param {Function} onConfirm  - callback when user presses Confirm
     */
    function showEmsConfirm(title, desc, onConfirm) {
        const overlay = document.getElementById('ems-modal-overlay');
        const card    = document.getElementById('ems-modal-card');
        if (!overlay || !card) return;

        card.className = 'mod-warning';

        document.getElementById('ems-modal-icon').innerHTML    = _emsIcons.warning;
        document.getElementById('ems-modal-badge').textContent = _emsBadgeLabels.delete;
        document.getElementById('ems-modal-title').textContent  = title;
        document.getElementById('ems-modal-desc').textContent   = desc;

        document.getElementById('ems-modal-progress-wrap').innerHTML = '';

        // Replace footer with Cancel + Confirm
        const footer = overlay.querySelector('.ems-modal-footer');
        footer.innerHTML = `
            <button onclick="closeEmsModal()" style="
                min-width:110px; padding:0.52rem 1.2rem; border:1.5px solid var(--border,#e5e7eb);
                border-radius:10px; font-size:0.9rem; font-weight:600; cursor:pointer;
                background:transparent; color:var(--text-body,#374151);
                transition:background 0.15s ease; margin-right:0.6rem;
            " onmouseover="this.style.background='var(--border,#e5e7eb)'" onmouseout="this.style.background='transparent'">
                ${_lang['cancel']}
            </button>
            <button id="ems-confirm-ok-btn" style="
                min-width:110px; padding:0.52rem 1.2rem; border:none;
                border-radius:10px; font-size:0.9rem; font-weight:700; cursor:pointer;
                background:#ef4444; color:#fff;
                transition:filter 0.15s ease;
            " onmouseover="this.style.filter='brightness(1.1)'" onmouseout="this.style.filter='brightness(1)'">
                ${_lang['confirm_delete']}
            </button>
        `;

        document.getElementById('ems-confirm-ok-btn').onclick = () => {
            // Restore normal footer for next use
            footer.innerHTML = `<button id="ems-modal-close-btn" onclick="closeEmsModal()">${_lang['ok']}</button>`;
            closeEmsModal();
            if (typeof onConfirm === 'function') onConfirm();
        };

        overlay.classList.add('show');
        document.body.style.overflow = 'hidden';
    }

    /* ── Backward-compat shim so old showToast() calls still work ── */
    function showToast(type, message, duration = 2800) {
        const actionMap = { success: 'update', error: 'error', info: 'connect', blue: 'enable' };
        const titleMap  = {
            success: 'สำเร็จ',
            error:   'เกิดข้อผิดพลาด',
            info:    'ข้อมูล',
            blue:    'แจ้งเตือน',
        };
        showEmsModal(type, actionMap[type] || 'update', titleMap[type] || '', message, duration);
    }

    let meters = [];
    let selected_meter = [];
    let types = [];
    let notifies = [];
    let outputText = '';
    document.addEventListener("DOMContentLoaded", async () => {
        process();
    });
    async function process() {
        //showLoading();
        await fetchAll();
        generateMeter(meters);
        //hideLoading();
    }

    async function fetchAll() {
        meters = await fetchMetersData();
        types = await fetchTypes();
        notifies = await fetchnotify();

        console.log(meters);
        
    }
    async function fetchMetersData() {
        let response = await fetch("../config/fetch-meters.php");
        let json = await response.json();
        return Object.values(json.data);
    }
    async function fetchTypes() {
        let response = await fetch("../config/fetch-data_type.php");
        let json = await response.json();
        return json.data;
    }
    async function fetchnotify() {
        let response = await fetch("../config/fetch-notify.php");
        let json = await response.json();
        return json.data;
    }

    async function TestConnect() {
        let select = document.getElementById("select-protocol");
        let id = document.getElementById("meter-id");
        let ip = document.getElementById("ip-meter");
        let port = document.getElementById("port");
        let serialport = document.getElementById("serialport");
        let buad_rate = document.getElementById("buad_rate");
        let data_bits = document.getElementById("data_bits");
        let parity = document.getElementById("parity");
        let stop_bits = document.getElementById("stop_bits");
        let slave_id = document.getElementById("slave_id");
        let address = document.getElementById("address");
        let quality = document.getElementById("quality");
        let labelStatusConnect = document.getElementById("label-btn-connect");
        let detailmore = document.getElementById("detailmore");
        detailmore.style.display = "block";
        labelStatusConnect.textContent = "Loading...";
        labelStatusConnect.style.color = "white";

        let form = new FormData();
        if (select.value === 'tcp') {
            form.append('meter_id', id.value);
            form.append('ip', ip.value);
            form.append('port', port.value);
            form.append('quality', quality.value);
            form.append('slaveid', slave_id.value);
        }
        else {
            form.append('meter_id', id.value);
            form.append('serialport', serialport.value);
            form.append('buadrate', buad_rate.value);
            form.append('databits', data_bits.value);
            form.append('parity', parity.value);
            form.append('stopbits', stop_bits.value);
            form.append('slaveid', slave_id.value);
            form.append('address', address.value);
            form.append('quality', quality.value);
        }
        let response = await fetch(`../config/${select.value}.php`, {
            method: "POST",
            body: form
        });

        let json = await response.json();
        outputText = json.message + "\n" + json.output;
        labelStatusConnect.textContent = json.success ? "Connected" : "Failed";
        labelStatusConnect.style.color = json.success ? "green" : "red";

        if (json.success) {
            showEmsModal('success', 'connect',
                _lang['connect_success']      || 'เชื่อมต่อสำเร็จ',
                (_lang['connect_success_desc'] || 'Meter เชื่อมต่อได้ปกติ กรุณากดปุ่ม') + ' ' + _lang['save'] + ' ' + (_lang['connect_success_desc2'] || 'เพื่อบันทึก'), 4000);
        } else {
            showEmsModal('error', 'connect',
                _lang['connect_failed']      || 'เชื่อมต่อไม่สำเร็จ',
                json.message || _lang['connect_failed_desc'] || 'ไม่สามารถเชื่อมต่อกับ Meter ได้ กรุณาตรวจสอบการตั้งค่า', 5000);
        }
    }

    function generateMeter(meters) {
        let list = document.getElementById('meter-list');
        list.innerHTML = '';
        meters.forEach(meter => {
            let div = document.createElement('div');
            div.className = `px-3 mb-2 fw-bold d-flex justify-content-center align-content-center`;
            div.style.height = '40px';
            const container = document.createElement("div");
            container.id = 'meter';
            container.className = "container text-center align-content-center rounded bg choice";
            container.textContent = meter.name;
            div.onclick = () => loadDataMeter(meter);
            div.appendChild(container);
            list.appendChild(div);
        });
    }

    async function UpdateStatusNotify(meter_id, notify_id, status) {
        let formdata = new FormData();
        formdata.append('id', notify_id);
        formdata.append('status', status);

        // ── Toggle active/disabled ──────────────────────────────────────
        if (status === 'active') {
            const btn = document.getElementById('active-' + notify_id);
            const wasActive = btn.classList.contains('bg-blue'); // true = กำลัง enabled อยู่

            // สลับปุ่มทันที
            if (wasActive) {
                btn.classList.remove('bg-blue'); btn.classList.add('bg-red');
                btn.value = _lang['disabled'];
            } else {
                btn.classList.remove('bg-red'); btn.classList.add('bg-blue');
                btn.value = _lang['enabled'];
            }

            formdata.append('value', wasActive ? 1 : 0); // ส่งค่าเดิม (server จะ flip)

            showLoading();
            try {
                const res  = await fetch('../config/update-notify.php', { method: 'POST', body: formdata });
                const data = await res.json();
                if (data.success) {
                    notifies = await fetchnotify();
                    showEmsModal(wasActive ? 'error' : 'blue',
                        wasActive ? 'disable' : 'enable',
                        wasActive ? (_lang['notify_disabled_title'] || 'ปิดการแจ้งเตือนแล้ว')   : (_lang['notify_enabled_title'] || 'เปิดการแจ้งเตือนแล้ว'),
                        wasActive ? (_lang['notify_disabled_desc']  || 'การแจ้งเตือนนี้ถูกปิดใช้งานเรียบร้อยแล้ว') : (_lang['notify_enabled_desc'] || 'การแจ้งเตือนนี้ถูกเปิดใช้งานเรียบร้อยแล้ว'));
                } else {
                    // Revert กลับถ้า API ล้มเหลว
                    if (wasActive) {
                        btn.classList.remove('bg-red'); btn.classList.add('bg-blue'); btn.value = _lang['enabled'];
                    } else {
                        btn.classList.remove('bg-blue'); btn.classList.add('bg-red'); btn.value = _lang['disabled'];
                    }
                    showEmsModal('error', 'error',
                        _lang['save_failed'] || 'ไม่สามารถบันทึกได้',
                        data.message || _lang['status_change_error'] || 'เกิดข้อผิดพลาดในการเปลี่ยนสถานะ กรุณาลองอีกครั้ง');
                }
            } catch(e) { showEmsModal('error', 'error', _lang['error'] || 'เกิดข้อผิดพลาด', e.message); }
            hideLoading();
            return;
        }

        // ── Update / Create ──────────────────────────────────────────────
        if (status === 'update' || status === 'create') {
            const select = document.getElementById('select-mark-' + notify_id);
            const name   = document.getElementById('name-'        + notify_id);
            const value  = document.getElementById('value-'       + notify_id);
            const token  = document.getElementById('token-'       + notify_id);
            const email  = document.getElementById('email-'       + notify_id);
            const active = document.getElementById('active-'      + notify_id);
            const meter  = document.getElementById('meter-'       + notify_id);

            if (!select || !value || !token || !email) {
                console.error('Element not found for ID:', notify_id); return;
            }
            formdata.append('meter_id', meter.value);
            formdata.append('name',     name.value);
            formdata.append('mark',     select.value);
            formdata.append('value',    value.value);
            formdata.append('token',    token.value);
            formdata.append('email',    email.value);
            formdata.append('active',   active.classList.contains('bg-blue') ? 1 : 0);
        }

        showLoading();
        try {
            const res  = await fetch('../config/update-notify.php', { method: 'POST', body: formdata });
            const data = await res.json();
            if (data.success) {
                notifies = await fetchnotify();
                loadDataMeter(meters[meter_id - 1]);
                showEmsModal('success', status === 'create' ? 'create' : 'update',
                    status === 'create' ? (_lang['notify_created_title'] || 'สร้างการแจ้งเตือนสำเร็จ')   : (_lang['notify_updated_title'] || 'อัพเดตการแจ้งเตือนสำเร็จ'),
                    status === 'create' ? (_lang['notify_created_desc']  || 'การแจ้งเตือนใหม่ถูกบันทึกในระบบแล้ว') : (_lang['notify_updated_desc']  || 'ข้อมูลการแจ้งเตือนถูกอัพเดตเรียบร้อยแล้ว'));
            } else {
                showEmsModal('error', 'error',
                    _lang['save_failed'] || 'ไม่สามารถบันทึกได้',
                    data.message || _lang['save_error_desc'] || 'เกิดข้อผิดพลาดในการบันทึกข้อมูล กรุณาลองอีกครั้ง');
            }
        } catch(e) { showEmsModal('error', 'error', _lang['error'] || 'เกิดข้อผิดพลาด', e.message); }
        hideLoading();
    }

    async function updateMeter() {
        let formMeter = document.getElementById('meter-form');
        if (!formMeter) { console.error("Form element not found!"); return; }

        const btn = document.getElementById('btn-save-meter');
        const origHTML = btn ? btn.innerHTML : '';
        if (btn) {
            btn.disabled = true;
            btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="animation:spin .7s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> ${_lang['save']}...`;
            btn.style.opacity = '0.75';
        }
        if (!document.getElementById('ems-spin-style')) {
            const s = document.createElement('style');
            s.id = 'ems-spin-style';
            s.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
            document.head.appendChild(s);
        }

        showLoading();
        try {
            const res  = await fetch('../config/update-meter.php', { method: 'POST', body: new FormData(formMeter) });
            const data = await res.json();
            if (data.success) {
                showEmsModal('success', 'save',
                    _lang['save_success']      || 'บันทึกข้อมูลสำเร็จ',
                    _lang['save_success_desc'] || 'ข้อมูล Meter ถูกบันทึกในระบบเรียบร้อยแล้ว');
                setTimeout(() => process(), 2000);
            } else {
                showEmsModal('error', 'error',
                    _lang['save_failed']      || 'บันทึกไม่สำเร็จ',
                    data.message || _lang['save_failed_desc'] || 'เกิดข้อผิดพลาด กรุณาลองอีกครั้ง');
            }
        } catch(e) {
            console.error(e);
            showEmsModal('error', 'error',
                _lang['save_failed']    || 'บันทึกไม่สำเร็จ',
                _lang['network_error']  || 'เกิดข้อผิดพลาดที่ไม่คาดคิด กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ตแล้วลองใหม่อีกครั้ง');
        } finally {
            hideLoading();
            if (btn) { btn.disabled = false; btn.innerHTML = origHTML; btn.style.opacity = '1'; }
        }
    }

                <h6 class="ps-2"for="token">${_lang['token']} ${_lang['line']}</h6>

    function deleteNotify(mid, id) {
        showEmsConfirm(
            _lang['confirm_delete_title'] || 'คุณต้องการลบการแจ้งเตือนนี้?',
            _lang['confirm_delete_desc']  || 'การดำเนินการนี้ไม่สามารถย้อนกลับได้',
            async () => {
                showLoading();
                try {
                    let formdata = new FormData();
                    formdata.append('id', id);
                    formdata.append('status', 'delete');
                    const res  = await fetch('../config/update-notify.php', { method: 'POST', body: formdata });
                    const data = await res.json();
                    if (data.success) {
                        notifies = await fetchnotify();
                        loadDataMeter(meters[mid - 1]);
                        showEmsModal('success', 'delete',
                            _lang['delete_success']      || 'ลบการแจ้งเตือนสำเร็จ',
                            _lang['delete_success_desc'] || 'การแจ้งเตือนถูกลบออกจากระบบเรียบร้อยแล้ว');
                    } else {
                        showEmsModal('error', 'error',
                            _lang['delete_failed']      || 'ลบไม่สำเร็จ',
                            data.message || _lang['delete_error_desc'] || 'เกิดข้อผิดพลาดในการลบข้อมูล');
                    }
                } catch(e) {
                    showEmsModal('error', 'error', _lang['error'] || 'เกิดข้อผิดพลาด', e.message);
                }
                hideLoading();
            }
        );
    }
